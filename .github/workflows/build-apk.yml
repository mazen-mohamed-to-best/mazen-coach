name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Unzip project
        run: |
          rm -rf extracted
          mkdir -p extracted
          unzip -o to_best_project.zip -d extracted
          find extracted -name pubspec.yaml | head -n 20

      - name: Detect project root
        run: |
          PROJECT_DIR="$(dirname "$(find extracted -name pubspec.yaml | head -n 1)")"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Detected project dir: $PROJECT_DIR"
          ls -la "$PROJECT_DIR"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Recreate Android scaffold
        run: |
          cd "$PROJECT_DIR"

          rm -rf android
          flutter create --platforms=android --org com.tobest.app --project-name to_best .

          mkdir -p android/app/src/main/kotlin/com/tobest/app
          cat > android/app/src/main/kotlin/com/tobest/app/MainActivity.kt <<'EOF'
          package com.tobest.app
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity()
          EOF

      - name: Get dependencies
        run: |
          cd "$PROJECT_DIR"
          flutter pub get

      - name: Build release APK
        run: |
          cd "$PROJECT_DIR"
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/*.apk

name: Unzip Project Into Repo

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Check zip file exists
        run: |
          ls -la
          test -f to_best_project.zip

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Unzip into repo root
        run: |
          unzip -o to_best_project.zip
          rm -f to_best_project.zip
          find . -maxdepth 3 -type f | sort

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Unzip project files" || echo "No changes to commit"
          git push

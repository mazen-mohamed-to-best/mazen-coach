name: to_best
description: TO Best — Professional Training & Nutrition App
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.4

  # Network
  http: ^1.2.1
  connectivity_plus: ^6.0.3

  # Local Storage
  sqflite: ^2.3.3
  shared_preferences: ^2.2.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # Media
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  webview_flutter: ^4.8.0
  flutter_svg: ^2.0.10+1

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  crypto: ^3.0.3
  collection: ^1.18.0
  equatable: ^2.0.5
  json_annotation: ^4.9.0

  # Permissions
  permission_handler: ^11.3.1

  # Video
  youtube_player_flutter: ^9.0.2

  # Update system
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path_android: "assets/icons/icon_dark.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/icons/icon_dark.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
